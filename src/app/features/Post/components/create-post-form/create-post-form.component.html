<div class="create_post_form">
  <h3>Create a new Post</h3>
  <form class="post_form">
    <label for="file" class='file_label'>
      <input type="file" id='file'/>
      <app-icon [icon]="'plusGrey'"/>
    </label>
    <app-input
      class="input"
      type="text"
      placeholder="Name"
    />
    <app-input
      class="input"
      type="text"
      placeholder="Content"
    />
    <button class="btn">Create Post</button>
  </form>
</div>
